<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="icon" type="image/png" href="/icons/48/settings.png" />
    <link rel="apple-touch-icon" href="/icons/192/settings.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Reserva de Proyectores</title>
  </head>
  <body style="background-color: #020617; margin: 0; min-height: 100vh; display: flex; flex-direction: column;">
    <div id="root" style="flex: 1; display: flex; flex-direction: column;">
      <div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #020617; color: white; font-family: system-ui, -apple-system, sans-serif;">
        <div style="position: relative; margin-bottom: 2rem;">
          <!-- Projector Body -->
          <svg width="120" height="80" viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg" style="animation: pulse 2s infinite ease-in-out;">
            <rect x="10" y="20" width="100" height="40" rx="8" fill="#10b981" />
            <circle cx="90" cy="40" r="12" fill="#020617" />
            <circle cx="90" cy="40" r="8" fill="#34d399" />
            <rect x="25" y="30" width="40" height="4" rx="2" fill="#064e3b" />
            <rect x="25" y="40" width="30" height="4" rx="2" fill="#064e3b" />
            <rect x="25" y="50" width="45" height="4" rx="2" fill="#064e3b" />
            <!-- Feet -->
            <rect x="20" y="60" width="10" height="6" rx="2" fill="#10b981" />
            <rect x="90" y="60" width="10" height="6" rx="2" fill="#10b981" />
            <!-- Light Beam -->
            <path d="M102 40 L160 10 L160 70 Z" fill="url(#beamGradient)" opacity="0.6" style="animation: beam 2s infinite ease-in-out;">
              <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2s" repeatCount="indefinite" />
            </path>
            <defs>
              <linearGradient id="beamGradient" x1="102" y1="40" x2="160" y2="40" gradientUnits="userSpaceOnUse">
                <stop stop-color="#10b981" />
                <stop offset="1" stop-color="#10b981" stop-opacity="0" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div style="font-size: 1.5rem; font-weight: 600; letter-spacing: -0.025em;">Reserva de Proyectores</div>
        <div style="margin-top: 0.5rem; color: #94a3b8; font-size: 0.875rem; display: flex; align-items: center; gap: 8px;">
          <span>Iniciando sistema</span>
          <div style="display: flex; gap: 4px;">
            <div style="width: 4px; height: 4px; border-radius: 50%; background: #10b981; animation: bounce 1.4s infinite ease-in-out;"></div>
            <div style="width: 4px; height: 4px; border-radius: 50%; background: #10b981; animation: bounce 1.4s infinite 0.2s ease-in-out;"></div>
            <div style="width: 4px; height: 4px; border-radius: 50%; background: #10b981; animation: bounce 1.4s infinite 0.4s ease-in-out;"></div>
          </div>
        </div>
      </div>
      <style>
        @keyframes pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.05); }
        }
        @keyframes beam {
          0%, 100% { transform: translateX(0); }
          50% { transform: translateX(5px); }
        }
        @keyframes bounce {
          0%, 80%, 100% { transform: scale(0); }
          40% { transform: scale(1); }
        }
      </style>
    </div>
    <script>
      // Capture the beforeinstallprompt event as early as possible
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        window.deferredPrompt = e;
        // Dispatch a custom event so App.tsx can react if it's already mounted
        window.dispatchEvent(new CustomEvent('pwa-prompt-ready', { detail: e }));
      });
      
      window.addEventListener('appinstalled', () => {
        window.deferredPrompt = null;
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
